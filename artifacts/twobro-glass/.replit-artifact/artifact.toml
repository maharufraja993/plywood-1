kind = "web"
previewPath = "/"
title = "Twobro Glass Centre"
version = "1.0.0"
id = "artifacts/twobro-glass"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20251

[services.development]
run = "pnpm --filter @workspace/twobro-glass run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/twobro-glass", "run", "build" ]
publicDir = "artifacts/twobro-glass/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20251"
BASE_PATH = "/"
